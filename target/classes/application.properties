spring.application.name=MarketLens

# --- MongoDB Configuration ---
# Assicurati che MongoDB sia avviato in locale sulla porta standard 27017
spring.data.mongodb.uri=mongodb://10.1.1.65:27017,10.1.1.66:27017,10.1.1.67:27017/marketlens?replicaSet=lsmdb
spring.data.mongodb.database=marketlens
spring.data.mongodb.auto-index-creation=true
logging.level.org.springframework.data.mongodb.core.index=DEBUG
logging.level.org.springframework.data.mongodb.core.mapping=DEBUG

# --- Jackson Configuration (Per le date) ---
spring.jackson.serialization.write-dates-as-timestamps=false

# --- Swagger Configuration ---
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# --- NEO4J CONFIGURATION ---
spring.neo4j.uri=bolt://10.1.1.66:7687
spring.neo4j.authentication.username=neo4j
spring.neo4j.authentication.password=marketlens1
